<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="70" y="92" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="44" font-weight="800" fill="#07111f">Efficiency view: time, tokens, cost, footprint</text>
  <text x="70" y="132" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="24" fill="#5e6a7d">56 real coding tasks · lower is better except quality metrics</text>

  <g transform="translate(70 185)" font-family="Arial, 'Apple SD Gothic Neo', sans-serif">
    <rect width="1460" height="610" rx="24" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <g transform="translate(64 70)">
      <text x="0" y="0" font-size="28" font-weight="800" fill="#0f172a">Mean time / task</text>
      <rect x="0" y="30" width="520" height="32" rx="16" fill="#e2e8f0"/><rect x="0" y="30" width="318" height="32" rx="16" fill="#7c3aed"/><text x="545" y="56" font-size="24" fill="#0f172a">Opus 4.7 · 11m18s</text>
      <rect x="0" y="90" width="520" height="32" rx="16" fill="#e2e8f0"/><rect x="0" y="90" width="237" height="32" rx="16" fill="#2563eb"/><text x="545" y="116" font-size="24" fill="#0f172a">GPT-5.4 · 8m24s</text>
      <rect x="0" y="150" width="520" height="32" rx="16" fill="#e2e8f0"/><rect x="0" y="150" width="196" height="32" rx="16" fill="#0f8b4c"/><text x="545" y="176" font-size="24" font-weight="800" fill="#0f8b4c">GPT-5.5 · 6m56s</text>
    </g>
    <g transform="translate(64 350)">
      <text x="0" y="0" font-size="28" font-weight="800" fill="#0f172a">Total tokens</text>
      <text x="0" y="55" font-size="24" fill="#0f172a">Opus 4.7</text><text x="220" y="55" font-size="24" fill="#0f172a">239.1M input · 1.29M output</text>
      <text x="0" y="105" font-size="24" fill="#0f172a">GPT-5.4</text><text x="220" y="105" font-size="24" fill="#0f172a">222.3M input · 1.09M output</text>
      <text x="0" y="155" font-size="24" font-weight="800" fill="#0f8b4c">GPT-5.5</text><text x="220" y="155" font-size="24" font-weight="800" fill="#0f8b4c">201.8M input · 0.72M output</text>
    </g>
    <g transform="translate(900 70)">
      <text x="0" y="0" font-size="28" font-weight="800" fill="#0f172a">Cost / task</text>
      <text x="0" y="60" font-size="34" fill="#7c3aed">$3.43</text><text x="160" y="60" font-size="22" fill="#475569">Opus 4.7</text>
      <text x="0" y="128" font-size="34" font-weight="800" fill="#2563eb">$2.39</text><text x="160" y="128" font-size="22" fill="#475569">GPT-5.4 · cost leader</text>
      <text x="0" y="196" font-size="34" fill="#0f8b4c">$2.86</text><text x="160" y="196" font-size="22" fill="#475569">GPT-5.5</text>
    </g>
    <g transform="translate(900 350)">
      <text x="0" y="0" font-size="28" font-weight="800" fill="#0f172a">Footprint risk</text>
      <text x="0" y="60" font-size="34" font-weight="800" fill="#7c3aed">0.20</text><text x="160" y="60" font-size="22" fill="#475569">Opus 4.7 · smallest patches</text>
      <text x="0" y="128" font-size="34" fill="#2563eb">0.34</text><text x="160" y="128" font-size="22" fill="#475569">GPT-5.4</text>
      <text x="0" y="196" font-size="34" fill="#0f8b4c">0.32</text><text x="160" y="196" font-size="22" fill="#475569">GPT-5.5</text>
    </g>
  </g>

  <rect x="70" y="820" width="1460" height="48" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="94" y="852" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="23" font-weight="700" fill="#166534">정리: GPT-5.5는 시간·토큰 효율과 품질이 강하고, GPT-5.4는 비용/task가 낮고, Opus 4.7은 작은 패치가 강점입니다.</text>
</svg>
