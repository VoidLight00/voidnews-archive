<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0a0f1c"/>
  <text x="72" y="96" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="46" font-weight="800" fill="#f8fafc">Model choice is a workflow decision</text>
  <text x="72" y="138" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="25" fill="#aab6ca">Benchmark winner ≠ always the right model. Pick by bottleneck.</text>

  <g font-family="Arial, 'Apple SD Gothic Neo', sans-serif">
    <rect x="72" y="206" width="456" height="500" rx="28" fill="#f8fafc"/>
    <circle cx="138" cy="286" r="36" fill="#0f8b4c"/>
    <text x="190" y="294" font-size="34" font-weight="800" fill="#0f172a">GPT-5.5</text>
    <text x="108" y="372" font-size="28" font-weight="800" fill="#0f8b4c">Best shipping default</text>
    <text x="108" y="426" font-size="24" fill="#334155">• Clean pass: 28/56</text>
    <text x="108" y="470" font-size="24" fill="#334155">• Review pass: 33/56</text>
    <text x="108" y="514" font-size="24" fill="#334155">• Fastest mean time: 6m56s</text>
    <text x="108" y="594" font-size="24" font-weight="700" fill="#0f172a">Choose when:</text>
    <text x="108" y="636" font-size="22" fill="#334155">Review pass and correctness</text>
    <text x="108" y="670" font-size="22" fill="#334155">matter more than smallest diff.</text>

    <rect x="572" y="206" width="456" height="500" rx="28" fill="#f8fafc"/>
    <circle cx="638" cy="286" r="36" fill="#2563eb"/>
    <text x="690" y="294" font-size="34" font-weight="800" fill="#0f172a">GPT-5.4</text>
    <text x="608" y="372" font-size="28" font-weight="800" fill="#2563eb">Low cost middle option</text>
    <text x="608" y="426" font-size="24" fill="#334155">• Cost/task: $2.39</text>
    <text x="608" y="470" font-size="24" fill="#334155">• Human equiv: 35/56</text>
    <text x="608" y="514" font-size="24" fill="#334155">• Clean pass: 11/56</text>
    <text x="608" y="594" font-size="24" font-weight="700" fill="#0f172a">Choose when:</text>
    <text x="608" y="636" font-size="22" fill="#334155">Budget matters, but you still</text>
    <text x="608" y="670" font-size="22" fill="#334155">want a Codex-style workflow.</text>

    <rect x="1072" y="206" width="456" height="500" rx="28" fill="#f8fafc"/>
    <circle cx="1138" cy="286" r="36" fill="#7c3aed"/>
    <text x="1190" y="294" font-size="34" font-weight="800" fill="#0f172a">Opus 4.7</text>
    <text x="1108" y="372" font-size="28" font-weight="800" fill="#7c3aed">Small patch specialist</text>
    <text x="1108" y="426" font-size="24" fill="#334155">• Footprint risk: 0.20</text>
    <text x="1108" y="470" font-size="24" fill="#334155">• Tests pass: 33/56</text>
    <text x="1108" y="514" font-size="24" fill="#334155">• Clean pass: 10/56</text>
    <text x="1108" y="594" font-size="24" font-weight="700" fill="#0f172a">Choose when:</text>
    <text x="1108" y="636" font-size="22" fill="#334155">Small diffs are valuable and</text>
    <text x="1108" y="670" font-size="22" fill="#334155">human review will fill gaps.</text>
  </g>

  <rect x="72" y="760" width="1456" height="80" rx="20" fill="#111827" stroke="#334155"/>
  <text x="108" y="812" font-family="Arial, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="800" fill="#f8fafc">발표 메시지: “1등 모델”보다 내 repo의 병목이 review인지, 비용인지, patch footprint인지 먼저 봐야 합니다.</text>
</svg>
